[project]
name = "gwbenchmark2g-environment"
version = "0.1.0a1"
description = "Environment for generating 2g datasets"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "gwbenchmark2g@git+https://github.com/gwbenchmark/2gbenchmark.git@5219cfa99a6a343dbc1ee80a508d5f218c8f15bf",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"
